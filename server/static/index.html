<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tode — Annotation Platform</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

  <!-- ── NAV BAR ─────────────────────────────────────────────────────── -->
  <nav id="navbar">
    <h1>⬡ tode</h1>
    <span class="spacer"></span>
    <button id="new-project-btn" class="btn btn-primary">+ New Project</button>
  </nav>

  <!-- ── PROJECTS VIEW ───────────────────────────────────────────────── -->
  <div id="projects-view" class="view active">
    <h2>My Projects</h2>
    <div id="projects-grid"></div>
  </div>

  <!-- ── PROJECT DETAIL VIEW ─────────────────────────────────────────── -->
  <div id="detail-view" class="view">

    <div id="detail-header">
      <button id="back-btn" class="btn btn-secondary">&#8592; Projects</button>
      <h2 id="detail-title"></h2>
      <div class="spacer"></div>
      <button id="upload-btn" class="btn btn-secondary">&#128193; Upload Frames</button>
      <input id="upload-input" type="file" multiple accept="image/*" style="display:none"/>
      <!-- export format selector -->
      <select id="export-fmt" class="btn btn-secondary" style="cursor:pointer">
        <option value="yolo">YOLO</option>
        <option value="coco">COCO</option>
        <option value="csv">CSV</option>
        <option value="json">JSON</option>
      </select>
      <button id="export-btn" class="btn btn-secondary">&#8675; Export ZIP</button>
      <button id="delete-project-btn" class="btn btn-danger">&#128465; Delete</button>
    </div>

    <div id="workspace">

      <!-- canvas area -->
      <div id="canvas-area">
        <canvas id="annotation-canvas"></canvas>
        <div class="frame-nav">
          <button id="prev-frame-btn" class="btn btn-secondary">&#8592;</button>
          <span id="frame-counter" class="frame-counter">Frame 0 / 0</span>
          <button id="next-frame-btn" class="btn btn-secondary">&#8594;</button>
        </div>
      </div>

      <!-- right sidebar -->
      <div id="sidebar">

        <div class="sidebar-section">
          <h4>Annotation Type</h4>
          <div id="ann-type-tabs" class="type-tabs">
            <button class="type-tab active" data-type="bbox">&#x1F532; BBox</button>
            <button class="type-tab" data-type="seg">&#x2B20; Seg</button>
            <button class="type-tab" data-type="cls">&#x1F3F7; Cls</button>
          </div>
          <span id="draw-hint" style="font-size:.75rem;color:var(--text2)">Click-drag to draw a box</span>
          <!-- classification panel hidden by default -->
          <div id="cls-panel" style="display:none;margin-top:.5rem">
            <button id="apply-cls-btn" class="btn btn-primary" style="width:100%">Apply Classification</button>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="yolo-bar">
            <button id="yolo-btn" class="btn btn-secondary">&#9889; Auto YOLO</button>
            <input id="yolo-conf" type="range" min="0.1" max="0.9" step="0.05" value="0.25" title="Confidence threshold"/>
            <span id="yolo-conf-val" style="font-size:.75rem;color:var(--text2);white-space:nowrap">0.25</span>
          </div>
        </div>

        <div class="sidebar-section">
          <h4>Class Name</h4>
          <input id="class-input" class="btn btn-secondary" placeholder="object" style="width:100%;text-align:left;font-weight:400"/>
        </div>

        <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
          <h4>Annotations</h4>
          <ul id="ann-list"></ul>
        </div>

      </div>
    </div>

    <!-- frame strip at bottom -->
    <div id="frame-strip"></div>

  </div>

  <!-- ── NEW PROJECT MODAL ────────────────────────────────────────────── -->
  <div id="new-project-modal" class="modal-overlay">
    <form id="create-project-form" class="modal">
      <h3>New Project</h3>
      <div>
        <label>Name</label>
        <input id="proj-name" placeholder="my-dataset" required/>
      </div>
      <div>
        <label>Annotation Type</label>
        <select id="proj-type">
          <option value="detection">Detection (BBox)</option>
          <option value="segmentation">Segmentation (Polygon)</option>
          <option value="classification">Classification</option>
        </select>
      </div>
      <div>
        <label>Class Names (comma-separated)</label>
        <textarea id="proj-classes" placeholder="person, car, bike" rows="2" style="width:100%;resize:vertical"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" id="cancel-new-project" class="btn btn-secondary">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>

  <!-- ── TOAST ────────────────────────────────────────────────────────── -->
  <div id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
