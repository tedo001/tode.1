# Builds the Docker image and pushes it to Docker Hub.
#
# Triggers:
#   - push to master (publishes the "latest" + commit-sha tag)
#   - push of a git tag like v0.1.0 (publishes a versioned tag)
#   - manual run from the Actions tab
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   your Docker Hub user (e.g. tedo001)
#   DOCKERHUB_TOKEN      a Docker Hub access token (NOT your password)
#                        — generate at https://hub.docker.com/settings/security
#
# The image name defaults to {DOCKERHUB_USERNAME}/video-annotation.
# Override by setting an Actions variable IMAGE_NAME.

name: Publish Docker image

on:
  push:
    branches: [master]
    tags:     ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch later)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: vars
        run: |
          image="${{ vars.IMAGE_NAME }}"
          if [ -z "$image" ]; then
            image="${{ secrets.DOCKERHUB_USERNAME }}/video-annotation"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file:    ./Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          # Single-arch keeps the first build fast. To add ARM64 later
          # (Apple Silicon native), append `,linux/arm64`. Note: image
          # is ~2 GB so multi-arch pushes can exceed free-runner limits.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to:   type=gha,mode=max
