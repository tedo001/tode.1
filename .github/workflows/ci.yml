name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly re-run every Monday 07:00 UTC — catches dependency drift and
    # new CVEs that arrive between code changes.
    - cron: "0 7 * * 1"

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # Ruff is pinned so a new ruff release can't break previously-green CI.
      # Bump deliberately together with any rule additions to ruff.toml.
      - name: Install ruff
        run: pip install "ruff==0.15.8"

      - name: Check
        run: ruff check .

  # ── 2. Functional tests ───────────────────────────────────────────────────
  # Inspired by Ultralytics CI (timeout, PYTHONFAULTHANDLER, pip cache) and
  # Label Studio CI (--disable-warnings, --durations).
  # Installs only requirements-test.txt — no torch or ultralytics — because
  # the headless test suite exercises only the ONNX path and does not load
  # real model weights.
  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONFAULTHANDLER: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v --durations=10

  # ── 3. Examples smoke test ────────────────────────────────────────────────
  # The example scripts double as integration smoke tests. If a refactor
  # breaks a public import path, this catches it before docker build.
  examples:
    name: Examples (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime deps (headless ONNX-only)
        run: pip install -r requirements-test.txt

      - name: Run export_dataset example
        run: python examples/export_dataset.py /tmp/tode_export_demo

  # ── 4. Static security analysis (bandit) ─────────────────────────────────
  # Scans src/ for medium/high severity issues: shell injection, eval(),
  # hardcoded secrets, unsafe deserialization, etc.
  # Low-severity subprocess calls in ui/log_viewer.py are suppressed with
  # # nosec annotations because the path argument is always an app-owned
  # log file, never user-controlled input.
  bandit:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bandit
        run: pip install "bandit[toml]"

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml

  # ── 5. Dependency CVE audit (pip-audit) ──────────────────────────────────
  # Checks all three requirements files against the OSV + PyPI Advisory DB.
  # Fails if any installed package has a known CVE — fix by bumping the
  # affected dep or adding an --ignore-vuln GHSA-xxx flag with justification.
  pip-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit main requirements
        run: pip-audit -r requirements.txt

      - name: Audit ONNX requirements
        run: pip-audit -r requirements-onnx.txt

      - name: Audit test requirements
        run: pip-audit -r requirements-test.txt

  # ── 6. Secret scanning (gitleaks) ────────────────────────────────────────
  # Scans the full commit history for accidentally committed secrets:
  # API keys, tokens, passwords, private keys.
  # Runs the gitleaks binary directly (pinned version) to avoid the
  # commercial-license requirement of gitleaks-action@v2 on private repos.
  # fetch-depth: 0 is required so gitleaks can walk all commits, not just
  # the most recent one.
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . -v --redact

  # ── 7. SBOM generation (syft) ────────────────────────────────────────────
  # Generates a Software Bill of Materials in SPDX-JSON format and uploads
  # it as a workflow artifact. The SBOM is a machine-readable inventory of
  # every package bundled with tode — useful for security audits, license
  # compliance checks, and vulnerability management tooling.
  # Runs on master push only (not PRs) because it reflects the shipped code.
  sbom:
    name: SBOM (syft)
    runs-on: ubuntu-latest
    needs: [lint, tests, bandit, pip-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Generate SBOM (source + installed packages)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: tode-sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false

  # ── 8. Docker build (master push only — image is ~600 MB-7 GB) ────────────
  docker:
    name: Docker build (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: [lint, tests, bandit, pip-audit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            dockerfile: Dockerfile
            tag: tode:latest
          - variant: cpu
            dockerfile: docker/Dockerfile-cpu
            tag: tode:cpu
          - variant: onnx
            dockerfile: docker/Dockerfile-onnx
            tag: tode:onnx
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.variant }}
          key: ${{ runner.os }}-buildx-${{ matrix.variant }}-${{ hashFiles(matrix.dockerfile, 'requirements*.txt') }}
          restore-keys: ${{ runner.os }}-buildx-${{ matrix.variant }}-

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.tag }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.variant }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.variant }}-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.variant }}
          mv /tmp/.buildx-cache-${{ matrix.variant }}-new /tmp/.buildx-cache-${{ matrix.variant }}
