name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check
        run: ruff check .

  # ── 2. Smoke test — AGPL-free path (no ultralytics / no PyTorch) ──────────
  # Installs only the light deps so CI stays fast (<2 min).
  # Validates that the ONNX backend and all non-ML layers import cleanly
  # without needing the heavy Ultralytics stack.
  smoke:
    name: Smoke (ONNX path — no Torch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System deps (headless OpenCV)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3-tk libgl1

      - name: Install light Python deps
        run: |
          pip install \
            "opencv-python-headless>=4.8.0,<5.0.0" \
            "numpy>=1.24.0,<3.0.0" \
            "Pillow>=10.0.0" \
            "requests>=2.28.0" \
            "onnxruntime>=1.17.0"

      - name: Core imports
        run: |
          python - <<'EOF'
          from core.base_detector         import BaseDetector
          from core.detectors.onnx_detector        import ONNXDetector
          from core.detectors.ultralytics_detector import UltralyticsDetector
          from models.annotation_model    import BoundingBox, FrameAnnotation
          from storage.frame_storage      import FrameStorage
          from storage.label_storage      import LabelStorage
          from utils.config               import YOLO_MODELS, WEIGHTS_DIR, YOLO_CONFIDENCE
          print("All core imports OK")
          print(f"Model catalogue: {len(YOLO_MODELS)} entries")
          EOF

      - name: ONNXDetector unit
        run: |
          python - <<'EOF'
          from core.detectors.onnx_detector import ONNXDetector
          d = ONNXDetector(confidence=0.5, iou=0.4)
          assert not d.is_loaded(),           "should not be loaded before load()"
          assert d.backend_name == "ONNX Runtime"
          assert d.class_names  == {},        "no names before load()"
          print("ONNXDetector OK")
          EOF

      - name: Backend routing
        run: |
          python - <<'EOF'
          from core.yolo_annotator         import _make_detector
          from core.detectors.onnx_detector        import ONNXDetector
          from core.detectors.ultralytics_detector import UltralyticsDetector

          onnx_det = _make_detector("model.onnx",  0.45, 0.45)
          pt_det   = _make_detector("yolo26x",      0.45, 0.45)
          pt_det2  = _make_detector("mymodel.pt",   0.45, 0.45)

          assert isinstance(onnx_det, ONNXDetector),          ".onnx → ONNX"
          assert isinstance(pt_det,   UltralyticsDetector),   "bare name → Ultralytics"
          assert isinstance(pt_det2,  UltralyticsDetector),   ".pt → Ultralytics"
          print("Backend routing OK")
          EOF

      - name: ONNX preprocessing math
        run: |
          python - <<'EOF'
          import numpy as np
          from core.detectors.onnx_detector import ONNXDetector

          frame = np.zeros((720, 1280, 3), dtype=np.uint8)
          tensor, scale, pad_top, pad_left = ONNXDetector._preprocess(frame)

          assert tensor.shape == (1, 3, 640, 640), f"bad shape {tensor.shape}"
          assert tensor.dtype == np.float32
          assert 0.0 <= tensor.min() and tensor.max() <= 1.0
          assert abs(scale - 0.5) < 1e-6,   f"scale={scale}"
          assert pad_top  == 140,            f"pad_top={pad_top}"
          assert pad_left == 0,              f"pad_left={pad_left}"
          print("Preprocessing math OK")
          EOF

      - name: BoundingBox round-trip
        run: |
          python - <<'EOF'
          from models.annotation_model import BoundingBox
          box = BoundingBox(
              class_id=0, class_name="person",
              x_center=0.5, y_center=0.5, width=0.2, height=0.3,
          )
          line = box.to_yolo_line()
          parts = line.split()
          assert parts[0] == "0"
          assert abs(float(parts[1]) - 0.5) < 1e-4
          x1, y1, x2, y2 = box.to_pixel_coords(640, 480)
          assert x1 < x2 and y1 < y2
          print("BoundingBox OK")
          EOF

  # ── 3. Docker build (master push only — image is ~2 GB, slow on PRs) ──────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: tode:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
