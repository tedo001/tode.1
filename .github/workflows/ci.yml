name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check
        run: ruff check .

  # ── 2. Functional tests ───────────────────────────────────────────────────
  # Inspired by Ultralytics CI (timeout, PYTHONFAULTHANDLER, pip cache) and
  # Label Studio CI (--disable-warnings, --durations).
  # Installs only the lightweight subset of requirements.txt — no torch or
  # ultralytics — because the headless test suite exercises only the ONNX
  # path and does not load real model weights.
  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONFAULTHANDLER: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install \
            "opencv-python-headless>=4.8.0,<5.0.0" \
            "Pillow>=10.0.0" \
            "numpy>=1.24.0,<3.0.0" \
            "requests>=2.28.0" \
            "onnxruntime>=1.17.0" \
            pytest

      - name: Run tests
        run: pytest tests/test_functional.py -v --tb=short --disable-warnings --durations=10

  # ── 3. Docker build (master push only — image is ~2 GB, slow on PRs) ──────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'requirements.txt') }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: tode:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
